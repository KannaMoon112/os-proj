<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VMA Live</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f0f2f7; --bg2:#ffffff; --bg3:#e8ebf3;
  --border:#d4d9e8; --border2:#b8c0d8;
  --text:#1e2840; --dim:#7a85a0; --bright:#0f172a;
  --mono:'JetBrains Mono',monospace; --sans:'DM Sans',sans-serif;

  /* segment colours — pastel fills, strong strokes */
  --c-kernel:   #94a3b8; --ck-bg: #f1f5f9;
  --c-stack:    #dc2626; --cs-bg: #fef2f2;
  --c-mmap:     #d97706; --cm-bg: #fffbeb;
  --c-heap:     #16a34a; --ch-bg: #f0fdf4;
  --c-data:     #7c3aed; --cd-bg: #f5f3ff;
  --c-text:     #2563eb; --ct-bg: #eff6ff;
  --c-unknown:  #9ca3af; --cu-bg: #f9fafb;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);
     height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ── header ── */
header{display:flex;align-items:center;gap:12px;padding:8px 18px;
       background:var(--bg2);border-bottom:1px solid var(--border);
       flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.logo{font-family:var(--mono);font-size:13px;font-weight:700;color:#1d4ed8;letter-spacing:.04em}
.logo .dim{color:var(--border2);font-weight:400}
.logo .sub{color:var(--dim);font-weight:400;font-size:11px}
.pill{display:flex;align-items:center;gap:5px;padding:2px 10px;
      background:var(--bg3);border:1px solid var(--border);
      border-radius:99px;font-family:var(--mono);font-size:11px;color:var(--dim)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--border2);transition:.3s}
.dot.live{background:#16a34a;box-shadow:0 0 5px #16a34a99}
.dot.err{background:#dc2626}
.stats{display:flex;gap:18px;margin-left:2px}
.stat{font-family:var(--mono);font-size:11px;color:var(--dim)}
.stat b{color:var(--bright);margin-left:3px}
.right{margin-left:auto;display:flex;align-items:center;gap:8px}
select,button{background:var(--bg3);border:1px solid var(--border2);color:var(--bright);
              padding:3px 9px;border-radius:4px;font-family:var(--mono);font-size:11px;cursor:pointer}
button:hover{background:var(--border)}

/* ── layout ── */
.main{display:grid;grid-template-columns:1fr 310px;grid-template-rows:1fr 185px;flex:1;overflow:hidden}

/* ── VAS panel ── */
.vas-panel{grid-row:1/3;background:var(--bg2);border-right:1px solid var(--border);
           display:flex;flex-direction:column;overflow:hidden}
.phead{display:flex;justify-content:space-between;align-items:center;
       padding:6px 14px;border-bottom:1px solid var(--border);
       background:var(--bg3);font-family:var(--mono);font-size:11px;color:var(--dim);flex-shrink:0}
.phead strong{color:var(--text)}

/* ── VAS diagram ── */
#vas-wrap{flex:1;overflow:hidden;display:flex;flex-direction:column;
          align-items:center;justify-content:flex-start;padding:16px 24px;gap:0}

.seg-row{width:100%;max-width:520px;position:relative;flex-shrink:0}

/* the visible bar */
.seg-bar{
  width:100%;border-radius:4px;border:1.5px solid;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 10px;
  font-family:var(--mono);font-size:11px;font-weight:700;
  overflow:hidden;
  transition: height 0.35s cubic-bezier(.4,0,.2,1),
              background 0.2s,
              border-color 0.2s,
              opacity 0.2s;
  position:relative;
}
.seg-bar .seg-label{z-index:1;letter-spacing:.03em}
.seg-bar .seg-addr{font-size:9px;font-weight:400;opacity:.6;z-index:1}

/* growth arrows inside heap/stack */
.seg-bar .arrow{
  position:absolute;right:36px;font-size:14px;opacity:.35;
  transition:opacity .3s;pointer-events:none;
}
.seg-bar:hover .arrow{opacity:.7}

/* gap between segments = free address space */
.seg-gap{width:100%;max-width:520px;
         display:flex;align-items:center;justify-content:center;
         font-family:var(--mono);font-size:9px;color:var(--border2);
         padding:2px 0;flex-shrink:0}

/* highlight flash on change */
@keyframes flash{0%{filter:brightness(1.3)}100%{filter:brightness(1)}}
.seg-bar.flash{animation:flash .5s ease}

/* ── right panels ── */
.detail-panel{background:var(--bg2);border-bottom:1px solid var(--border);
              display:flex;flex-direction:column;overflow:hidden}
.event-panel{background:var(--bg);display:flex;flex-direction:column;
             overflow:hidden;border-top:1px solid var(--border)}
.pbody{flex:1;overflow-y:auto;padding:10px 12px;font-size:11px;font-family:var(--mono)}
.pbody::-webkit-scrollbar{width:3px}
.pbody::-webkit-scrollbar-thumb{background:var(--border2)}

.drow{display:flex;justify-content:space-between;padding:4px 0;
      border-bottom:1px solid var(--bg3);font-size:10px;gap:6px}
.dk{color:var(--dim);white-space:nowrap}.dv{color:var(--bright);text-align:right;word-break:break-all}
.dph{color:var(--dim);font-size:11px;text-align:center;padding:20px 0;font-style:italic}

#event-list{list-style:none;display:flex;flex-direction:column;gap:1px}
.ei{display:grid;grid-template-columns:52px 50px 1fr;gap:4px;
    padding:3px 2px;border-radius:3px;font-size:10px;line-height:1.5;
    animation:slideIn .15s ease;cursor:pointer;transition:background .1s}
.ei:hover{background:var(--bg3)}
@keyframes slideIn{from{opacity:0;transform:translateX(-3px)}to{opacity:1}}
.eb{text-align:center;border-radius:3px;padding:1px 0;font-weight:700;font-size:9px}
.eb-MMAP{background:#dbeafe;color:#1d4ed8}.eb-MUNMAP{background:#fee2e2;color:#b91c1c}
.eb-BRK{background:#dcfce7;color:#15803d}.eb-FORK{background:#f3e8ff;color:#7e22ce}
.eb-BASELINE{background:#f1f5f9;color:#475569}
.epid{color:var(--dim)}.edesc{color:var(--text);word-break:break-all}

/* tooltip */
#tip{position:fixed;background:var(--bg2);border:1px solid var(--border2);
     border-radius:6px;padding:8px 12px;font-family:var(--mono);font-size:10px;
     line-height:1.7;pointer-events:none;z-index:9999;max-width:260px;
     display:none;box-shadow:0 4px 16px rgba(0,0,0,.12)}
.tt{font-weight:700;font-size:11px;margin-bottom:4px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.tr{color:var(--dim)}.tr span{color:var(--bright)}
</style>
</head>
<body>
<header>
  <div class="logo">VMA<span class="dim">·</span>LIVE<span class="sub"> / process memory visualizer</span></div>
  <div class="pill"><div class="dot" id="dot"></div><span id="wslabel">connecting…</span></div>
  <div class="stats">
    <div class="stat">VMAs<b id="svmas">0</b></div>
    <div class="stat">Events<b id="sevents">0</b></div>
    <div class="stat">PIDs<b id="spids">0</b></div>
  </div>
  <div class="right">
    <label style="font-family:var(--mono);font-size:11px;color:var(--dim)">PID</label>
    <select id="pidsel"><option value="">— all —</option></select>
    <button id="btnclr">clear</button>
  </div>
</header>

<div class="main">
  <div class="vas-panel">
    <div class="phead"><strong>Virtual Address Space</strong><span>↑ high · ↓ low</span></div>
    <div id="vas-wrap"></div>
  </div>
  <div class="detail-panel">
    <div class="phead"><strong>Segment Inspector</strong><span>click a segment</span></div>
    <div class="pbody"><div id="detcontent"><div class="dph">Select a segment</div></div></div>
  </div>
  <div class="event-panel">
    <div class="phead"><strong>Event Stream</strong></div>
    <div class="pbody"><ul id="event-list"></ul></div>
  </div>
</div>
<div id="tip"></div>

<script>
// ── Segment taxonomy ─────────────────────────────────────────────
// Map fine-grained type -> display group
const GROUP = {
  stack:      'stack',
  heap:       'heap',
  text:       'text',
  data:       'data',
  rodata:     'data',
  shlib_text: 'mmap',
  shlib_data: 'mmap',
  anon:       'mmap',
  anon_exec:  'mmap',
  special:    'special',
  unknown:    'mmap',
};

const GSTYLE = {
  kernel:  { label:'Kernel Space',        color:'#64748b', bg:'#f1f5f9', arrow:'' },
  stack:   { label:'Stack',               color:'#dc2626', bg:'#fef2f2', arrow:'↓' },
  mmap:    { label:'Memory Map / Libs',   color:'#d97706', bg:'#fffbeb', arrow:'' },
  heap:    { label:'Heap',                color:'#16a34a', bg:'#f0fdf4', arrow:'↑' },
  data:    { label:'Data / BSS',          color:'#7c3aed', bg:'#f5f3ff', arrow:'' },
  text:    { label:'Text',                color:'#2563eb', bg:'#eff6ff', arrow:'' },
};

// ── State ────────────────────────────────────────────────────────
let snapshots = {};   // pid -> { pid, vmas }
let currentPid = null;
let eventCount = 0;

// ── Derived layout model ──────────────────────────────────────────
// Collapse vma list into ordered segment groups for display
function buildSegments(vmas) {
  if (!vmas || !vmas.length) return [];

  // Assign group
  const annotated = vmas.map(v => ({...v, group: GROUP[v.type] || 'mmap'}));

  // Compute per-group address extents
  const extents = {};
  for (const v of annotated) {
    const g = v.group;
    if (!extents[g]) extents[g] = { min: Infinity, max: -Infinity, vmas: [] };
    extents[g].min = Math.min(extents[g].min, Number(v.start));
    extents[g].max = Math.max(extents[g].max, Number(v.end));
    extents[g].vmas.push(v);
  }

  // Fixed display order (high addr → low addr, kernel at top)
  const ORDER = ['kernel','stack','mmap','heap','data','text'];

  // Build list — only include groups actually present (+ always kernel placeholder)
  const segs = [];
  for (const g of ORDER) {
    if (g === 'kernel') {
      segs.push({ group: 'kernel', min: 0xffff800000000000, max: 0xffffffffffffffff,
                  bytes: 0, vmas: [] });
      continue;
    }
    if (extents[g]) {
      const e = extents[g];
      segs.push({ group: g, min: e.min, max: e.max,
                  bytes: e.max - e.min, vmas: e.vmas });
    }
  }
  return segs;
}

// ── Height mapping ─────────────────────────────────────────────────
// Min/max px height per segment type
const H_MIN = { kernel:28, stack:28, mmap:28, heap:28, data:28, text:28 };
const H_MAX = { kernel:28, stack:180, mmap:180, heap:180, data:80, text:80 };

function segHeight(seg, allSegs) {
  const type = seg.group;
  const min = H_MIN[type] || 28, max = H_MAX[type] || 80;
  if (!seg.bytes || seg.bytes === 0) return min;
  // Find largest segment for relative scaling
  const maxBytes = Math.max(...allSegs.map(s => s.bytes || 0));
  if (maxBytes === 0) return min;
  const ratio = Math.log1p(seg.bytes) / Math.log1p(maxBytes);
  return Math.round(min + ratio * (max - min));
}

// ── DOM renderer ──────────────────────────────────────────────────
const wrap = document.getElementById('vas-wrap');
// Track existing segment elements by group id
const segEls = {};  // group -> { row, bar }

function renderVAS() {
  const vmas = getVmas();
  const segs = buildSegments(vmas);

  document.getElementById('svmas').textContent = vmas.length;

  if (segs.length === 0) {
    wrap.innerHTML = '<div style="color:var(--border2);font-family:var(--mono);font-size:12px;margin-top:40px">Waiting for events…</div>';
    Object.keys(segEls).forEach(k => delete segEls[k]);
    return;
  }

  // Add/update segments
  const seenGroups = new Set();
  let prevEl = null;

  for (const seg of segs) {
    seenGroups.add(seg.group);
    const style = GSTYLE[seg.group] || GSTYLE.mmap;
    const h = segHeight(seg, segs);
    const fmtMin = fmtAddr(seg.min);
    const fmtMax = fmtAddr(seg.max);

    if (segEls[seg.group]) {
      // UPDATE existing element — this triggers CSS transition
      const { bar } = segEls[seg.group];
      const oldH = parseInt(bar.style.height);
      bar.style.height = h + 'px';
      bar.style.lineHeight = h + 'px';
      // Update address label
      const addrEl = bar.querySelector('.seg-addr');
      if (addrEl) addrEl.textContent = fmtMin + ' – ' + fmtMax;
      // Flash on change
      if (oldH !== h) {
        bar.classList.remove('flash');
        void bar.offsetWidth;  // reflow
        bar.classList.add('flash');
      }
      // Update stored segment data for click handler
      bar._seg = seg;
    } else {
      // CREATE new element
      const row = document.createElement('div');
      row.className = 'seg-row';

      // Gap above (free space indicator)
      const gap = document.createElement('div');
      gap.className = 'seg-gap';
      gap.textContent = '· · ·';

      const bar = document.createElement('div');
      bar.className = 'seg-bar';
      bar.style.height = h + 'px';
      bar.style.lineHeight = h + 'px';
      bar.style.backgroundColor = style.bg;
      bar.style.borderColor = style.color;
      bar.style.color = style.color;
      bar._seg = seg;

      bar.innerHTML = `
        <span class="seg-label">${style.label}</span>
        ${style.arrow ? `<span class="arrow">${style.arrow}</span>` : ''}
        <span class="seg-addr">${fmtMin} – ${fmtMax}</span>`;

      bar.addEventListener('mouseenter', e => showTip(e, bar._seg, style));
      bar.addEventListener('mouseleave', () => { document.getElementById('tip').style.display='none'; });
      bar.addEventListener('click', () => showDetail(bar._seg, style));

      // Don't show gap for kernel (top element)
      if (seg.group !== 'kernel') row.appendChild(gap);
      row.appendChild(bar);

      // Insert in correct position
      if (prevEl) {
        prevEl.after(row);
      } else {
        wrap.prepend(row);
      }
      segEls[seg.group] = { row, bar };
    }
    prevEl = segEls[seg.group].row;
  }

  // Remove segments no longer present
  for (const g of Object.keys(segEls)) {
    if (!seenGroups.has(g)) {
      segEls[g].row.remove();
      delete segEls[g];
    }
  }
}

// ── WebSocket ─────────────────────────────────────────────────────
let ws, pingTimer;
function connectWS() {
  ws = new WebSocket(`ws://${location.host}/ws`);
  ws.onopen = () => {
    setStatus('live','live');
    clearInterval(pingTimer);
    pingTimer = setInterval(() => ws.readyState===1 && ws.send('ping'), 20000);
  };
  ws.onclose = () => { setStatus('err','reconnecting…'); setTimeout(connectWS,2000); };
  ws.onerror = () => ws.close();
  ws.onmessage = ({data}) => { try { dispatch(JSON.parse(data)); } catch(e){ console.error(e); } };
}

function setStatus(cls, label) {
  document.getElementById('dot').className = 'dot ' + cls;
  const l = document.getElementById('wslabel');
  l.textContent = label;
  l.style.color = cls==='live' ? '#16a34a' : '#dc2626';
}

// ── Message dispatch ──────────────────────────────────────────────
// Backend shapes (lean):
//   init:      { type:"init",     payload:{ all_pids:{"pid":[vmas]}, ts } }
//   baseline:  { type:"baseline", payload:{ pid, vmas:[...], ts } }
//   vma_event: { type:"vma_event",payload:<event>, snapshot:{ pid, vmas:[...], ts } }
function dispatch(msg) {
  const { type, payload } = msg;
  if (type === 'pong') return;

  if (type === 'init') {
    for (const [pidStr, vmas] of Object.entries(payload.all_pids || {})) {
      snapshots[pidStr] = { pid: parseInt(pidStr), vmas: vmas || [] };
    }
    syncPids(); renderVAS(); return;
  }

  if (type === 'baseline') {
    // payload = { pid, vmas, ts }
    snapshots[String(payload.pid)] = payload;
    syncPids(); renderVAS();
    addEvent({ event:'BASELINE', pid:payload.pid, count:(payload.vmas||[]).length });
    eventCount++; updateStats(); return;
  }

  if (type === 'vma_event') {
    // msg.snapshot = { pid, vmas, ts }
    const snap = msg.snapshot;
    if (snap && snap.pid != null) {
      snapshots[String(snap.pid)] = snap;
      syncPids(); renderVAS();  // ← re-render immediately
    }
    if (payload && payload.event) { addEvent(payload); eventCount++; updateStats(); }
    return;
  }
}

// ── PID selector ──────────────────────────────────────────────────
function syncPids() {
  const sel = document.getElementById('pidsel');
  const prev = sel.value;
  const pids = Object.keys(snapshots).sort((a,b)=>+a-+b);
  sel.innerHTML = '<option value="">— all —</option>';
  pids.forEach(p => { const o = document.createElement('option'); o.value=p; o.textContent=`PID ${p}`; sel.appendChild(o); });
  if (prev && pids.includes(prev)) sel.value = prev;
}
document.getElementById('pidsel').addEventListener('change', e => { currentPid = e.target.value || null; renderVAS(); });
document.getElementById('btnclr').addEventListener('click', () => {
  snapshots={}; eventCount=0;
  document.getElementById('event-list').innerHTML='';
  // Clear DOM segments
  Object.values(segEls).forEach(({row})=>row.remove());
  Object.keys(segEls).forEach(k=>delete segEls[k]);
  syncPids(); renderVAS(); updateStats();
});

function getVmas() {
  if (currentPid) return snapshots[currentPid]?.vmas || [];
  const seen = new Set(), all = [];
  for (const s of Object.values(snapshots))
    for (const v of (s.vmas||[])) {
      const k=`${v.pid}:${v.start}:${v.end}`;
      if (!seen.has(k)) { seen.add(k); all.push(v); }
    }
  return all;
}

function updateStats() {
  document.getElementById('sevents').textContent = eventCount;
  document.getElementById('spids').textContent   = Object.keys(snapshots).length;
}

// ── Helpers ───────────────────────────────────────────────────────
const fmtAddr = n => '0x' + Number(n).toString(16).padStart(12,'0');
const fmtSize = n => { n=Number(n); if(n>=1048576) return (n/1048576).toFixed(1)+' MB'; if(n>=1024) return (n/1024).toFixed(1)+' KB'; return n+' B'; };

// ── Tooltip ───────────────────────────────────────────────────────
const tip = document.getElementById('tip');
function showTip(e, seg, style) {
  tip.innerHTML = `
    <div class="tt" style="color:${style.color}">${style.label}</div>
    <div class="tr">start &nbsp;<span>${fmtAddr(seg.min)}</span></div>
    <div class="tr">end   &nbsp;&nbsp;<span>${fmtAddr(seg.max)}</span></div>
    <div class="tr">size  &nbsp;&nbsp;<span>${fmtSize(seg.bytes)}</span></div>
    <div class="tr">VMAs  &nbsp;&nbsp;<span>${seg.vmas.length}</span></div>`;
  tip.style.display='block';
  moveTip(e);
}
document.addEventListener('mousemove', moveTip);
function moveTip(e) {
  if (tip.style.display!=='block') return;
  tip.style.left = Math.min(e.clientX+14, window.innerWidth-270)+'px';
  tip.style.top  = (e.clientY-8)+'px';
}

// ── Inspector ─────────────────────────────────────────────────────
function showDetail(seg, style) {
  const rows = [
    ['Segment',  `<span style="color:${style.color};font-weight:700">${style.label}</span>`],
    ['Start',    fmtAddr(seg.min)],
    ['End',      fmtAddr(seg.max)],
    ['Size',     fmtSize(seg.bytes)],
    ['# VMAs',   seg.vmas.length],
    ['Types',    [...new Set(seg.vmas.map(v=>v.type))].join(', ') || '—'],
    ['Paths',    [...new Set(seg.vmas.map(v=>v.path).filter(Boolean))].slice(0,3).join(', ') || '—'],
  ];
  document.getElementById('detcontent').innerHTML =
    rows.map(([k,v]) => `<div class="drow"><span class="dk">${k}</span><span class="dv">${v}</span></div>`).join('');
}

// ── Event log ─────────────────────────────────────────────────────
function addEvent(ev) {
  const op = ev.event || ev.op || '?';
  const li = document.createElement('li'); li.className='ei';
  let desc='';
  if (op==='MMAP')     { const sz=Number(ev.end)-Number(ev.start); desc=`${fmtAddr(ev.start)}  ${fmtSize(sz)}  [${ev.type||''}]`; }
  else if (op==='MUNMAP') { desc=`unmap ${fmtAddr(ev.start)}  (${(ev.removed||[]).length} VMAs)`; }
  else if (op==='BRK')    { desc=`heap ${fmtAddr(ev.start)} → ${fmtAddr(ev.end)}  [${ev.direction||''}]`; }
  else if (op==='FORK')   { desc=`child PID ${ev.child_pid}  (${ev.cloned} VMAs)`; }
  else if (op==='BASELINE') { desc=`snapshot — ${ev.count} VMAs`; }
  else { desc=JSON.stringify(ev).slice(0,60); }
  li.innerHTML=`<span class="eb eb-${op}">${op}</span><span class="epid">${ev.pid||ev.parent_pid||''}</span><span class="edesc">${desc}</span>`;
  const list=document.getElementById('event-list');
  list.prepend(li);
  while(list.children.length>300) list.removeChild(list.lastChild);
}

// ── Boot ──────────────────────────────────────────────────────────
connectWS();
</script>
</body>
</html>
