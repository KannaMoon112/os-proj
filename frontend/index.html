<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VMA Live</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f0f2f7; --bg2:#ffffff; --bg3:#e8ebf3;
  --border:#d4d9e8; --border2:#b8c0d8;
  --text:#1e2840; --dim:#7a85a0; --bright:#0f172a;
  --mono:'JetBrains Mono',monospace; --sans:'DM Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{display:flex;align-items:center;gap:12px;padding:8px 18px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.logo{font-family:var(--mono);font-size:13px;font-weight:700;color:#1d4ed8;letter-spacing:.04em}
.logo .dim{color:var(--border2);font-weight:400}
.logo .sub{color:var(--dim);font-weight:400;font-size:11px}
.pill{display:flex;align-items:center;gap:5px;padding:2px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:99px;font-family:var(--mono);font-size:11px;color:var(--dim)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--border2);transition:.3s}
.dot.live{background:#16a34a;box-shadow:0 0 5px #16a34a99}
.dot.err{background:#dc2626}
.stats{display:flex;gap:18px;margin-left:2px}
.stat{font-family:var(--mono);font-size:11px;color:var(--dim)}
.stat b{color:var(--bright);margin-left:3px}
.right{margin-left:auto;display:flex;align-items:center;gap:8px}
button{background:var(--bg3);border:1px solid var(--border2);color:var(--bright);padding:3px 9px;border-radius:4px;font-family:var(--mono);font-size:11px;cursor:pointer}
button:hover{background:var(--border)}

.main{display:grid;grid-template-columns:1fr 320px;grid-template-rows:1fr 185px;flex:1;overflow:hidden}
.vas-panel{grid-row:1/3;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.phead{display:flex;justify-content:space-between;align-items:center;padding:6px 14px;border-bottom:1px solid var(--border);background:var(--bg3);font-family:var(--mono);font-size:11px;color:var(--dim);flex-shrink:0}
.phead strong{color:var(--text)}

#vas-wrap{flex:1;overflow:auto;display:flex;align-items:stretch;gap:14px;padding:12px 16px}
.vas-col{min-width:280px;max-width:320px;flex:0 0 300px;border:1px solid var(--border);border-radius:8px;background:#fbfcff;display:flex;flex-direction:column;overflow:hidden}
.vas-col-head{padding:6px 10px;border-bottom:1px solid var(--border);font-family:var(--mono);font-size:11px;color:var(--dim);display:flex;justify-content:space-between;align-items:center;background:#f6f8fd}
.vas-col-head b{color:var(--bright)}
.vas-col-body{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:8px 10px}

.seg-gap{width:100%;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:9px;color:var(--border2);flex-shrink:0}
.seg-gap.book{color:#94a3b8}
.seg-bar{width:100%;border-radius:4px;border:1.5px solid;display:flex;align-items:center;justify-content:space-between;padding:0 10px;font-family:var(--mono);font-size:11px;font-weight:700;overflow:hidden;position:relative;flex-shrink:0;transition:height .25s ease, filter .2s ease}
.seg-label{white-space:nowrap}
.seg-addr{font-size:9px;font-weight:400;opacity:.65;margin-left:8px}
.delta{position:absolute;right:8px;top:2px;font-size:9px;font-weight:700;opacity:.75}
.arrow{position:absolute;right:58px;font-size:14px;opacity:.35;pointer-events:none}
@keyframes flash{0%{filter:brightness(1.35)}100%{filter:brightness(1)}}
.seg-bar.flash{animation:flash .45s ease}

.detail-panel{background:var(--bg2);border-bottom:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.event-panel{background:var(--bg);display:flex;flex-direction:column;overflow:hidden;border-top:1px solid var(--border)}
.pbody{flex:1;overflow-y:auto;padding:10px 12px;font-size:11px;font-family:var(--mono)}
.pbody::-webkit-scrollbar{width:3px}
.pbody::-webkit-scrollbar-thumb{background:var(--border2)}
.drow{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--bg3);font-size:10px;gap:6px}
.dk{color:var(--dim);white-space:nowrap}
.dv{color:var(--bright);text-align:right;word-break:break-all}
.dph{color:var(--dim);font-size:11px;text-align:center;padding:20px 0;font-style:italic}
#event-list{list-style:none;display:flex;flex-direction:column;gap:1px}
.ei{display:grid;grid-template-columns:52px 58px 1fr;gap:4px;padding:3px 2px;border-radius:3px;font-size:10px;line-height:1.5;animation:slideIn .15s ease;cursor:pointer;transition:background .1s}
.ei:hover{background:var(--bg3)}
@keyframes slideIn{from{opacity:0;transform:translateX(-3px)}to{opacity:1}}
.eb{text-align:center;border-radius:3px;padding:1px 0;font-weight:700;font-size:9px}
.eb-MMAP{background:#dbeafe;color:#1d4ed8}.eb-MUNMAP{background:#fee2e2;color:#b91c1c}
.eb-BRK{background:#dcfce7;color:#15803d}.eb-FORK{background:#f3e8ff;color:#7e22ce}
.eb-BASELINE{background:#f1f5f9;color:#475569}
.epid{color:var(--dim)}.edesc{color:var(--text);word-break:break-all}

#tip{position:fixed;background:var(--bg2);border:1px solid var(--border2);border-radius:6px;padding:8px 12px;font-family:var(--mono);font-size:10px;line-height:1.7;pointer-events:none;z-index:9999;max-width:280px;display:none;box-shadow:0 4px 16px rgba(0,0,0,.12)}
.tt{font-weight:700;font-size:11px;margin-bottom:4px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.tr{color:var(--dim)}.tr span{color:var(--bright)}
@media (max-width: 1050px){.main{grid-template-columns:1fr;grid-template-rows:1fr 180px 180px}}
</style>
</head>
<body>
<header>
  <div class="logo">VMA<span class="dim">·</span>LIVE<span class="sub"> / process memory visualizer</span></div>
  <div class="pill"><div class="dot" id="dot"></div><span id="wslabel">connecting…</span></div>
  <div class="stats">
    <div class="stat">VMAs<b id="svmas">0</b></div>
    <div class="stat">Events<b id="sevents">0</b></div>
    <div class="stat">PIDs<b id="spids">0</b></div>
  </div>
  <div class="right">
    <button id="btnclr" title="Clear backend state + frontend">⟳ reset run</button>
  </div>
</header>

<div class="main">
  <div class="vas-panel">
    <div class="phead"><strong>Virtual Address Space</strong><span>fork child renders at parent right side</span></div>
    <div id="vas-wrap"></div>
  </div>
  <div class="detail-panel">
    <div class="phead"><strong>Segment Inspector</strong><span>click a segment</span></div>
    <div class="pbody"><div id="detcontent"><div class="dph">Select a segment</div></div></div>
  </div>
  <div class="event-panel">
    <div class="phead"><strong>Event Stream</strong></div>
    <div class="pbody"><ul id="event-list"></ul></div>
  </div>
</div>
<div id="tip"></div>

<script>
const GROUP = {
  stack:'stack', heap:'heap', text:'text', data:'data', rodata:'data',
  shlib_text:'mmap', shlib_data:'mmap', anon:'mmap', anon_exec:'mmap',
  special:'special', unknown:'mmap',
};
const GSTYLE = {
  kernel:{label:'Kernel Space',color:'#64748b',bg:'#f1f5f9',arrow:''},
  stack:{label:'Stack',color:'#dc2626',bg:'#fef2f2',arrow:'↓'},
  mmap:{label:'Mmap / Libs',color:'#d97706',bg:'#fffbeb',arrow:''},
  heap:{label:'Heap',color:'#16a34a',bg:'#f0fdf4',arrow:'↑'},
  data:{label:'Data / BSS',color:'#7c3aed',bg:'#f5f3ff',arrow:''},
  text:{label:'Text',color:'#2563eb',bg:'#eff6ff',arrow:''},
  special:{label:'Special (vDSO/vvar/vsyscall)',color:'#0f766e',bg:'#ecfeff',arrow:''},
};
const ORDER = ['kernel','stack','mmap','heap','data','text','special'];

let snapshots = {};
let pidOrder = [];
let eventCount = 0;
let prevSegBytes = {};

const wrap = document.getElementById('vas-wrap');
const tip = document.getElementById('tip');

function fmtAddr(n){ return '0x' + Number(n).toString(16); }
function fmtSize(n){
  n = Math.abs(Number(n));
  if (n >= 1024*1024*1024) return (n/(1024*1024*1024)).toFixed(2)+' GB';
  if (n >= 1024*1024) return (n/(1024*1024)).toFixed(1)+' MB';
  if (n >= 1024) return (n/1024).toFixed(1)+' KB';
  return n+' B';
}
function signedSize(n){ return (n >= 0 ? '+' : '-') + fmtSize(n); }

function ensurePid(pid){
  const s = String(pid);
  if (!pidOrder.includes(s)) pidOrder.push(s);
}
function placeChildRight(parentPid, childPid){
  const p = String(parentPid), c = String(childPid);
  pidOrder = pidOrder.filter(x => x !== c);
  const idx = pidOrder.indexOf(p);
  if (idx >= 0) pidOrder.splice(idx + 1, 0, c); else pidOrder.push(c);
}

function buildSegments(vmas){
  if (!vmas || !vmas.length) return [];

  const annotated = vmas.map(v => ({...v, group: GROUP[v.type] || 'mmap'}));
  const extents = {};
  for (const v of annotated){
    const g = v.group;
    const s = Number(v.start), e = Number(v.end);
    if (!extents[g]) extents[g] = { min: Infinity, max: -Infinity, bytes: 0, vmas: [] };
    extents[g].min = Math.min(extents[g].min, s);
    extents[g].max = Math.max(extents[g].max, e);
    extents[g].bytes += Math.max(0, e - s); // fix: sum length, not span
    extents[g].vmas.push(v);
  }

  const segs = [];
  for (const g of ORDER){
    if (g === 'kernel'){
      segs.push({group:'kernel', min:0xffff800000000000, max:0xffffffffffffffff, bytes:0, vmas:[]});
      continue;
    }
    if (!extents[g]) continue;
    const e = extents[g];
    segs.push({group:g, min:e.min, max:e.max, bytes:e.bytes, vmas:e.vmas});
  }
  return segs;
}

function rawBarHeight(seg, allSegs, pid){
  const type = seg.group;
  const HMIN = {kernel:20, stack:34, mmap:34, heap:34, data:22, text:22, special:18}[type] || 22;
  const HMAX = {kernel:20, stack:210, mmap:210, heap:210, data:110, text:110, special:40}[type] || 110;
  if (!seg.bytes) return HMIN;

  const maxBytes = Math.max(...allSegs.map(s => s.bytes || 0));
  const ratio = maxBytes > 0 ? Math.pow(Math.log1p(seg.bytes)/Math.log1p(maxBytes), 0.65) : 0;
  let h = HMIN + ratio * (HMAX - HMIN);

  const key = `${pid}:${seg.group}`;
  const oldBytes = prevSegBytes[key];
  const delta = oldBytes == null ? 0 : (seg.bytes - oldBytes);
  seg.delta = delta;

  if (delta !== 0 && (type === 'heap' || type === 'stack' || type === 'mmap')) {
    const boost = Math.min(72, Math.log2(1 + Math.abs(delta)/4096) * 14);
    h += boost;
  }
  return Math.round(h);
}

function gapHeight(prevGroup, group){
  if (prevGroup === 'stack' && group === 'mmap') return {px:18,label:'free space'};
  if (prevGroup === 'mmap' && group === 'heap') return {px:22,label:'free space'};
  return {px:6,label:'· · ·'};
}

function renderVAS(){
  const pidsFromState = Object.keys(snapshots).sort((a,b)=>+a-+b);
  pidsFromState.forEach(ensurePid);
  pidOrder = pidOrder.filter(pid => snapshots[pid]);

  if (!pidOrder.length){
    wrap.innerHTML = '<div style="color:var(--border2);font-family:var(--mono);font-size:12px;margin-top:24px">Waiting for events…</div>';
    document.getElementById('svmas').textContent = '0';
    return;
  }

  wrap.innerHTML = '';
  let totalVmas = 0;
  const availableH = Math.max(220, wrap.clientHeight - 16);

  for (const pid of pidOrder){
    const snap = snapshots[pid];
    const vmas = snap?.vmas || [];
    totalVmas += vmas.length;
    const segs = buildSegments(vmas);

    const col = document.createElement('div');
    col.className = 'vas-col';
    const head = document.createElement('div');
    head.className = 'vas-col-head';
    head.innerHTML = `<span><b>PID ${pid}</b></span><span>${vmas.length} VMAs</span>`;
    col.appendChild(head);

    const body = document.createElement('div');
    body.className = 'vas-col-body';
    col.appendChild(body);

    if (!segs.length){
      body.innerHTML = '<div style="color:var(--border2);font-family:var(--mono);font-size:11px;margin-top:10px">No VMAs yet</div>';
      wrap.appendChild(col);
      continue;
    }

    const bars = segs.map(seg => ({seg, rawH: rawBarHeight(seg, segs, pid)}));
    const gaps = [];
    for (let i = 0; i < segs.length; i++) gaps.push(i===0 ? {px:0,label:''} : gapHeight(segs[i-1].group, segs[i].group));

    const rawTotal = bars.reduce((a,b)=>a+b.rawH,0) + gaps.reduce((a,b)=>a+b.px,0);
    const scale = rawTotal > availableH ? (availableH / rawTotal) : 1;

    for (let i = 0; i < bars.length; i++){
      const seg = bars[i].seg;
      const style = GSTYLE[seg.group] || GSTYLE.mmap;

      if (i !== 0){
        const g = gaps[i];
        const gh = Math.max(3, Math.round(g.px * scale));
        const gap = document.createElement('div');
        gap.className = 'seg-gap' + (g.label === 'free space' ? ' book' : '');
        gap.style.height = gh + 'px';
        gap.textContent = g.label;
        body.appendChild(gap);
      }

      const h = Math.max(seg.group === 'kernel' ? 18 : 14, Math.round(bars[i].rawH * scale));
      const bar = document.createElement('div');
      bar.className = 'seg-bar';
      if (seg.delta) bar.classList.add('flash');
      bar.style.height = h + 'px';
      bar.style.backgroundColor = style.bg;
      bar.style.borderColor = style.color;
      bar.style.color = style.color;

      const deltaText = seg.delta ? `<span class="delta">${signedSize(seg.delta)}</span>` : '';
      bar.innerHTML = `
        <span class="seg-label">${style.label}</span>
        ${style.arrow ? `<span class="arrow">${style.arrow}</span>` : ''}
        <span class="seg-addr">${fmtAddr(seg.min)} - ${fmtAddr(seg.max)}</span>
        ${deltaText}
      `;

      bar.addEventListener('mouseenter', e => showTip(e, pid, seg, style));
      bar.addEventListener('mouseleave', () => { tip.style.display = 'none'; });
      bar.addEventListener('click', () => showDetail(pid, seg, style));
      body.appendChild(bar);

      prevSegBytes[`${pid}:${seg.group}`] = seg.bytes;
    }

    wrap.appendChild(col);
  }

  document.getElementById('svmas').textContent = totalVmas;
}

function showTip(e, pid, seg, style){
  tip.innerHTML = `
    <div class="tt" style="color:${style.color}">PID ${pid} · ${style.label}</div>
    <div class="tr">start <span>${fmtAddr(seg.min)}</span></div>
    <div class="tr">end <span>${fmtAddr(seg.max)}</span></div>
    <div class="tr">size <span>${fmtSize(seg.bytes)}</span></div>
    <div class="tr">delta <span>${seg.delta ? signedSize(seg.delta) : '0 B'}</span></div>
    <div class="tr">VMAs <span>${seg.vmas.length}</span></div>
  `;
  tip.style.display = 'block';
  moveTip(e);
}
document.addEventListener('mousemove', moveTip);
function moveTip(e){
  if (tip.style.display !== 'block') return;
  tip.style.left = Math.min(e.clientX + 14, window.innerWidth - 290) + 'px';
  tip.style.top = (e.clientY - 8) + 'px';
}

function showDetail(pid, seg, style){
  const rows = [
    ['PID', pid],
    ['Segment', `<span style="color:${style.color};font-weight:700">${style.label}</span>`],
    ['Start', fmtAddr(seg.min)],
    ['End', fmtAddr(seg.max)],
    ['Size', fmtSize(seg.bytes)],
    ['Delta', seg.delta ? signedSize(seg.delta) : '0 B'],
    ['# VMAs', seg.vmas.length],
    ['Types', [...new Set(seg.vmas.map(v=>v.type))].join(', ') || '—'],
    ['Paths', [...new Set(seg.vmas.map(v=>v.path).filter(Boolean))].slice(0,3).join(', ') || '—'],
  ];
  document.getElementById('detcontent').innerHTML = rows.map(([k,v]) => `<div class="drow"><span class="dk">${k}</span><span class="dv">${v}</span></div>`).join('');
}

function updateStats(){
  document.getElementById('sevents').textContent = eventCount;
  document.getElementById('spids').textContent = Object.keys(snapshots).length;
}
function addEvent(ev){
  const op = ev.event || ev.op || '?';
  const li = document.createElement('li'); li.className='ei';
  let desc = '';
  if (op === 'MMAP') desc = `${fmtAddr(ev.start)}  ${fmtSize(Number(ev.end)-Number(ev.start))}  [${ev.type||''}]`;
  else if (op === 'MUNMAP') desc = `unmap ${fmtAddr(ev.start)}  (${(ev.removed||[]).length} VMAs)`;
  else if (op === 'BRK') desc = `heap ${fmtAddr(ev.start)} -> ${fmtAddr(ev.end)}  [${ev.direction||''}]`;
  else if (op === 'FORK') desc = `child PID ${ev.child_pid}  (${ev.cloned} VMAs)`;
  else if (op === 'BASELINE') desc = `snapshot - ${ev.count} VMAs`;
  else desc = JSON.stringify(ev).slice(0, 80);
  li.innerHTML = `<span class="eb eb-${op}">${op}</span><span class="epid">${ev.pid||ev.parent_pid||''}</span><span class="edesc">${desc}</span>`;
  const list = document.getElementById('event-list');
  list.prepend(li);
  while (list.children.length > 300) list.removeChild(list.lastChild);
}
function clearFrontend(){
  snapshots = {};
  pidOrder = [];
  prevSegBytes = {};
  eventCount = 0;
  document.getElementById('event-list').innerHTML = '';
  document.getElementById('detcontent').innerHTML = '<div class="dph">Select a segment</div>';
  renderVAS();
  updateStats();
}

let ws, pingTimer;
function setStatus(cls, label){
  document.getElementById('dot').className = 'dot ' + cls;
  const l = document.getElementById('wslabel');
  l.textContent = label;
  l.style.color = cls==='live' ? '#16a34a' : '#dc2626';
}
function connectWS(){
  ws = new WebSocket(`ws://${location.host}/ws`);
  ws.onopen = () => {
    setStatus('live','live');
    clearInterval(pingTimer);
    pingTimer = setInterval(() => ws.readyState===1 && ws.send('ping'), 20000);
  };
  ws.onclose = () => { setStatus('err','reconnecting…'); setTimeout(connectWS, 2000); };
  ws.onerror = () => ws.close();
  ws.onmessage = ({data}) => { try { dispatch(JSON.parse(data)); } catch(e){ console.error('ws parse error', e, data); } };
}

function dispatch(msg){
  const { type, payload } = msg;
  if (type === 'pong') return;
  if (type === 'reset'){ clearFrontend(); addEvent({event:'BASELINE', pid:'—', count:0}); return; }

  if (type === 'init'){
    snapshots = {}; pidOrder = [];
    for (const [pidStr, vmas] of Object.entries((payload && payload.all_pids) || {})){
      snapshots[pidStr] = { pid: parseInt(pidStr, 10), vmas: vmas || [] };
      ensurePid(pidStr);
    }
    renderVAS(); updateStats(); return;
  }

  if (type === 'baseline'){
    const pid = String(payload.pid);
    snapshots[pid] = payload;
    ensurePid(pid);
    addEvent({event:'BASELINE', pid:payload.pid, count:(payload.vmas||[]).length});
    eventCount++;
    renderVAS();
    updateStats();
    return;
  }

  if (type === 'vma_event'){
    const ev = payload || {};
    const snap = msg.snapshot;
    if (ev.event === 'FORK' && ev.parent_pid != null && ev.child_pid != null) placeChildRight(ev.parent_pid, ev.child_pid);
    if (snap && snap.pid != null){
      const pid = String(snap.pid);
      snapshots[pid] = snap;
      ensurePid(pid);
    }
    if (ev.event){ addEvent(ev); eventCount++; }
    renderVAS();
    updateStats();
  }
}

document.getElementById('btnclr').addEventListener('click', async () => {
  const btn = document.getElementById('btnclr');
  btn.disabled = true; btn.textContent = '…';
  try { await fetch('/reset', { method: 'POST' }); } catch (e) { clearFrontend(); }
  finally { btn.disabled = false; btn.textContent = '⟳ reset run'; }
});
window.addEventListener('resize', () => renderVAS());
connectWS();
</script>
</body>
</html>
